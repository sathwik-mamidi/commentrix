name: Checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mvp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            mvp/requirements.txt
            mvp/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Reject AI attribution trailers
        run: |
          if git log --format='%B' | grep -Eiq 'Co-Authored-By:.*(Claude|Anthropic)|Claude-Session:'; then
            echo "Claude attribution found in reachable commit history."
            exit 1
          fi

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Compile
        run: python -m compileall -q app main.py tests
